<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デベロッパー・リクルーター様向け資料</title>
    <style>
        body {
            font-family: "Noto Sans JP", sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            margin-top: 2rem;
        }
        .btn-primary {
            display: inline-block;
            background-color: #10b981;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background-color 0.2s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }
        .btn-github {
            display: inline-block;
            background-color: #24292e;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background-color 0.2s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(36, 41, 46, 0.3);
        }
        .btn-github:hover {
            background-color: #1b1f23;
            transform: translateY(-2px);
        }
        .btn-back {
            display: inline-block;
            background-color: #64748b;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.2s, transform 0.2s;
        }
        .btn-back:hover {
            background-color: #475569;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-top: 0; margin-bottom: 2rem; color: #1e293b;">デベロッパー・リクルーター様向け資料</h1>
        
        <div class="btn-group">
            <a href="https://sigepiyo338.pythonanywhere.com/media/sihankun-playguide.pdf" target="_blank" rel="noopener noreferrer" class="btn-primary">
                しりとり師範くん遊び方ガイド
            </a>
            
            <a href="https://github.com/sigepiyo338-droid/siritori" target="_blank" rel="noopener noreferrer" class="btn-github">
                GitHubリポジトリ
            </a>
            
            <a href="{% url 'landing' %}" class="btn-back">戻る</a>
        </div>
    </div>
</body>
</html>
