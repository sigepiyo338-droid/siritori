{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="メール送信完了">
    <title>メール送信完了 | しげぴよの制作部屋</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'shiritori_game/css/style.css' %}">
    <link rel="icon" type="image/png" href="{% static 'img/sigepiyokun128.png' %}">
</head>
<body>
    <div id="app-container" class="app-container" style="justify-content: center; min-height: 100vh;">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <main class="game-main" style="margin-bottom: 0;">
            <div class="game-card menu-card" style="max-width: 450px; padding: 3rem 2rem;">
                <div class="header-logo" style="justify-content: center; margin-bottom: 1.5rem;">
                    <img src="{% static 'img/sigepiyokun128.png' %}" alt="しげぴよの制作部屋ロゴ" class="logo-icon-img">
                    <h1 style="font-size: 1.6rem; letter-spacing: 1px;">しげぴよの制作部屋</h1>
                </div>
                
                <i class="fa-solid fa-envelope-circle-check status-icon" style="color: var(--success-color); font-size: 3.5rem; margin-bottom: 1.5rem; filter: drop-shadow(0 0 10px rgba(52, 211, 153, 0.4));"></i>
                
                <h2 style="font-size: 1.3rem; margin-bottom: 1rem; font-weight: 700; color: var(--text-primary);">
                    メールを送信しました
                </h2>
                
                <p style="font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 2rem; text-align: left; line-height: 1.6;">
                    入力いただいたメールアドレス宛に、パスワード再設定用のURLを記載したメールを送信しました。<br><br>
                    メール内のリンクをクリックして、新しいパスワードを設定してください。
                </p>
                
                <div style="margin-top: 2rem; border-top: 1px solid var(--card-border); padding-top: 1.5rem; text-align: center;">
                    <a href="{% url 'landing' %}" class="btn btn-secondary" style="width: 100%;">
                        <i class="fa-solid fa-house"></i> トップ画面に戻る
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
